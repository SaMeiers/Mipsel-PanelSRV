name: Compilar panelsrv para mipsel

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Reemplazar TOKEN desde secreto
        if: ${{ secrets.PANELSRV_TOKEN != '' }}
        run: sed -i 's/change/${{ secrets.PANELSRV_TOKEN }}/g' panelsrv.c

      - name: Descargar y extraer toolchain mipsel-linux-musl
        run: |
          cd /tmp
          wget -q https://musl.cc/mipsel-linux-musl-cross.tgz
          tar xzf mipsel-linux-musl-cross.tgz

      - name: Compilar estático para mipsel
        run: |
          export PATH="/tmp/mipsel-linux-musl-cross/bin:$PATH"
          mipsel-linux-musl-gcc -static -O2 -o panelsrv panelsrv.c
          file panelsrv

      - name: Subir binario como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: panelsrv-mipsel
          path: panelsrv
